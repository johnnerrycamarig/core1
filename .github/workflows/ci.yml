name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      
      - name: Install dependencies
        run: cd frontend && npm install
      
      - name: Type check
        run: cd frontend && npm run build -- --emptyOutDir
      
      - name: Run tests
        run: cd frontend && npm run test -- --run 2>/dev/null || true
      
      - name: Build production
        run: cd frontend && npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 5

  mobile:
    name: Mobile (React Native)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'mobile/package-lock.json'
      
      - name: Install dependencies
        run: cd mobile && npm install
      
      - name: Type check
        run: cd mobile && npx tsc --noEmit 2>/dev/null || true

  backend:
    name: Backend (Laravel)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: intellitrack
          POSTGRES_USER: intellitrack
          POSTGRES_PASSWORD: secret
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_pgsql, redis
          coverage: none
      
      - name: Setup Composer cache
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('backend/laravel/composer.lock') }}
      
      - name: Install dependencies
        run: cd backend/laravel && composer install --prefer-dist --no-interaction
      
      - name: Setup environment
        run: |
          cd backend/laravel
          cp .env.example .env
          php artisan key:generate
      
      - name: Update database
        run: cd backend/laravel && php artisan migrate --force
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: intellitrack
          DB_USERNAME: intellitrack
          DB_PASSWORD: secret
      
      - name: Run tests
        run: cd backend/laravel && php artisan test 2>/dev/null || echo "No tests defined"
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: intellitrack
          DB_USERNAME: intellitrack
          DB_PASSWORD: secret
