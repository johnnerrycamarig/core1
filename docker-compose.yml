version: '3.9'
services:
  app:
    build:
      context: ./backend/laravel
      dockerfile: Dockerfile
    image: intellitrack_backend
    ports:
      - '8000:8000'
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: intellitrack
      DB_USERNAME: intellitrack
      DB_PASSWORD: secret
      REDIS_HOST: redis
    depends_on:
      - db
      - redis
  db:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - ./backend/laravel/.env.example
    ports:
      - '5432:5432'
    volumes:
      - db-data:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - '6379:6379'
volumes:
  db-data:
